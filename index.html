<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>beep boop</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=Nunito:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #f9c4c0 0%,
          #fde8d8 35%,
          #e8f2e4 70%,
          #b8d9b0 100%
        );
        background-attachment: fixed;
        font-family: "Nunito", sans-serif;
        color: #2e2118;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        text-align: center;
        max-width: 420px;
      }

      .deco {
        font-size: 2.6rem;
        display: block;
        margin-bottom: 1.2rem;
        animation: float 5s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-9px);
        }
      }

      h1 {
        font-family: "Fraunces", serif;
        font-size: clamp(2rem, 7vw, 3rem);
        font-weight: 700;
        color: #d96b3f;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .tagline {
        margin-top: 0.7rem;
        font-size: 0.98rem;
        color: #7a6050;
        font-weight: 600;
        font-style: italic;
        font-family: "Fraunces", serif;
      }

      .links {
        margin-top: 2.4rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        align-items: center;
      }

      .link-card {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        background: rgba(255, 253, 249, 0.82);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 14px;
        padding: 0.85rem 1.3rem;
        text-decoration: none;
        color: #2e2118;
        width: 100%;
        box-shadow: 0 3px 14px rgba(46, 33, 24, 0.09);
        transition:
          transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.2s ease;
      }

      .link-card:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 8px 28px rgba(46, 33, 24, 0.15);
      }

      .link-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
      }

      .link-text {
        text-align: left;
      }
      .link-title {
        font-family: "Fraunces", serif;
        font-weight: 700;
        font-size: 0.95rem;
        color: #d96b3f;
      }
      .link-desc {
        font-size: 0.75rem;
        color: #7a6050;
        font-weight: 600;
        margin-top: 0.1rem;
      }

      .arrow {
        margin-left: auto;
        color: #d96b3f;
        font-size: 1rem;
        opacity: 0.6;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .link-card:hover .arrow {
        opacity: 1;
        transform: translateX(3px);
      }

      footer {
        position: fixed;
        bottom: 1.2rem;
        font-size: 0.72rem;
        color: #a08070;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>dirdo.us</h1>
      <p class="tagline">hi there</p>

      <nav class="links">
        <a href="/mia-library" class="link-card">
          <span class="link-icon">📚</span>
          <span class="link-text">
            <div class="link-title">Mia's Little Library</div>
            <div class="link-desc">Browse Mia's book collection</div>
          </span>
          <span class="arrow">→</span>
        </a>
      </nav>
    </div>

    <footer>more coming someday ✨</footer>
  </body>
</html>
